<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日分析</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/news.css" />
</head>
<body>
  <header class="app-header">
    <h1 id="daily-page-title">📅 每日分析</h1>
    <div class="status-bar">
      <a class="btn btn-secondary" id="daily-back-link" href="/">← 返回列表</a>
      <a class="btn btn-secondary" href="/config.html">⚙️ 配置</a>
    </div>
  </header>

  <main class="daily-page-shell">
    <div class="daily-source-switch">
      <a class="btn btn-secondary" href="/daily.html?source=news">📰 金十每日分析</a>
      <a class="btn btn-secondary" href="/daily.html?source=cls">⚡ CLS 每日电报分析</a>
    </div>
    <div class="daily-page-note" id="daily-page-note">加载中…</div>
    <section class="daily-page-card">
      <div class="daily-panel visible">
        <div class="daily-panel-inner">
          <h2 id="daily-panel-title">📅 每日分析</h2>
          <div class="calendar-nav">
            <button class="btn btn-secondary" onclick="calendarPrev()">◀ 上月</button>
            <span class="calendar-month-label" id="calendar-month-label"></span>
            <button class="btn btn-secondary" onclick="calendarNext()">下月 ▶</button>
            <button class="btn btn-secondary" onclick="calendarToday()">今天</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
          <div class="daily-content" id="daily-content">
            <div class="daily-meta" id="daily-meta">请选择日期查看分析</div>
            <div id="daily-rows"></div>
            <div class="daily-empty" id="daily-empty" style="display:none">该日暂无每日分析，可点击下方按钮生成</div>
            <div class="daily-actions">
              <button class="btn btn-secondary" id="daily-trigger-btn" onclick="triggerDailyAnalysis()">🤖 生成当日分析</button>
              <button class="btn btn-secondary" onclick="loadDailyForSelected()">🔄 刷新</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/daily.js"></script>
</body>
</html>
