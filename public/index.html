<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金十重要新闻 · AI 分析</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --accent: #3b82f6;
      --bull: #22c55e;
      --bear: #ef4444;
      --neutral: #94a3b8;
      --card-radius: 12px;
      --gap: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 17, 23, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neutral);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.ok   { background: var(--bull); box-shadow: 0 0 6px var(--bull); animation: pulse 2s infinite; }
    #status-dot.err  { background: var(--bear); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    #refresh-btn {
      padding: 5px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    #refresh-btn:hover { opacity: 0.85; }
    #refresh-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Waterfall layout ───────────────────────────────────── */
    #news-grid {
      columns: 3 320px;
      column-gap: var(--gap);
      padding: var(--gap) 16px 40px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      break-inside: avoid;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 14px 16px;
      margin-bottom: var(--gap);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }

    .card-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: #f97316;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .card-content {
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.6;
      overflow-wrap: break-word;
    }

    /* ── AI analysis block ──────────────────────────────────── */
    .ai-block {
      margin-top: 12px;
      background: var(--surface2);
      border-radius: 8px;
      overflow: hidden;
    }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .ai-header:hover { background: rgba(255,255,255,0.03); }

    .ai-header-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      flex: 1;
    }

    .direction-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .direction-badge.bull    { background: rgba(34,197,94,0.15);  color: var(--bull); }
    .direction-badge.bear    { background: rgba(239,68,68,0.15);  color: var(--bear); }
    .direction-badge.neutral { background: rgba(148,163,184,0.12); color: var(--neutral); }

    .ai-toggle {
      font-size: 0.65rem;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .ai-toggle.open { transform: rotate(180deg); }

    .ai-body {
      padding: 10px 12px;
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--text);
    }
    .ai-body.collapsed { display: none; }

    .ai-row {
      display: grid;
      grid-template-columns: 5.5em 1fr;
      gap: 2px 8px;
      margin-bottom: 4px;
    }
    .ai-row-label {
      color: var(--text-muted);
      font-size: 0.72rem;
      padding-top: 2px;
      white-space: nowrap;
    }
    .ai-row-value { overflow-wrap: break-word; }

    .ai-no-analysis {
      padding: 10px 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .tech-block {
      margin-top: 4px;
      padding: 6px 10px;
      background: rgba(59,130,246,0.06);
      border-left: 2px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-size: 0.72rem;
      line-height: 1.7;
      color: var(--text-muted);
    }

    /* ── Loading / empty state ──────────────────────────────── */
    #loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    #load-more-wrap {
      text-align: center;
      padding: 16px;
    }
    #load-more-btn {
      padding: 8px 28px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: background 0.2s;
    }
    #load-more-btn:hover { background: var(--surface2); }
    #load-more-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 680px) {
      #news-grid { columns: 1; padding: 10px; }
      header h1 { font-size: 1rem; }
    }

    /* ── Card actions ────────────────────────────────────────── */
    .card-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .reanalyze-btn {
      padding: 4px 12px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.72rem;
      font-family: inherit;
      transition: background 0.2s, color 0.2s;
    }
    .reanalyze-btn:hover { background: rgba(59,130,246,0.15); color: var(--text); }
    .reanalyze-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Daily Analysis Panel ────────────────────────────────── */
    #daily-panel {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    #daily-panel.visible { display: block; }
    #daily-panel-inner {
      max-width: 1600px;
      margin: 0 auto;
    }
    #daily-panel h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    #daily-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .daily-row {
      display: grid;
      grid-template-columns: 6.5em 1fr;
      gap: 3px 8px;
      margin-bottom: 5px;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .daily-row-label { color: var(--text-muted); padding-top: 2px; white-space: nowrap; }
    #daily-empty { font-size: 0.82rem; color: var(--text-muted); font-style: italic; }
    .daily-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      padding: 5px 12px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      display: inline-block;
    }
    .nav-btn:hover { background: rgba(59,130,246,0.15); color: var(--text); }
    .nav-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Skipped news card ──────────────────────────────────── */
    .card.skipped {
      opacity: 0.55;
      border-left: 3px solid #f59e0b;
    }
    .skip-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Toggle switch ─────────────────────────────────────── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .toggle-switch {
      position: relative;
      width: 34px;
      height: 18px;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .toggle-wrap.active .toggle-switch {
      background: var(--accent);
    }
    .toggle-wrap.active .toggle-switch::after {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <header>
    <h1>📡 金十重要新闻 · AI 分析</h1>
    <div id="status-bar">
      <span id="status-dot"></span>
      <span id="status-text">加载中…</span>
      <button class="nav-btn" onclick="toggleDailyPanel()">📅 每日分析</button>
      <label class="toggle-wrap" id="skipped-toggle" onclick="toggleSkipped()">
        <span class="toggle-switch"></span>
        <span>显示跳过</span>
      </label>
      <a class="nav-btn" href="/config.html">⚙️ 配置</a>
      <button id="refresh-btn" onclick="refresh()">刷新</button>
    </div>
  </header>

  <!-- Daily Analysis Panel -->
  <div id="daily-panel">
    <div id="daily-panel-inner">
      <h2>📅 每日新闻综合分析</h2>
      <div id="daily-meta">加载中…</div>
      <div id="daily-rows"></div>
      <div id="daily-empty" style="display:none">今日暂无每日分析，可点击下方按钮生成</div>
      <div class="daily-actions">
        <button class="nav-btn" id="daily-trigger-btn" onclick="triggerDailyAnalysis()">🤖 生成今日分析</button>
        <button class="nav-btn" onclick="loadDailyAnalysis()">🔄 刷新</button>
      </div>
    </div>
  </div>

  <div id="news-grid">
    <div id="loading">正在加载新闻…</div>
  </div>

  <div id="load-more-wrap" style="display:none">
    <button id="load-more-btn" onclick="loadMore()">加载更多</button>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let allItems = [];
    let oldestCreatedAt = 0;
    let hasMore = false;
    let autoRefreshTimer = null;
    let showSkipped = false;
    const PAGE_SIZE = 20;

    function skippedParam() {
      return showSkipped ? '&includeSkipped=1' : '';
    }

    function toggleSkipped() {
      showSkipped = !showSkipped;
      document.getElementById('skipped-toggle').classList.toggle('active', showSkipped);
      // 重新加载全部新闻
      loadNews(true);
    }

    // ── Bootstrap ──────────────────────────────────────────────────────────
    async function init() {
      await loadNews(true);
      updateStatusBar();
      scheduleAutoRefresh();
    }

    function scheduleAutoRefresh() {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(refresh, 30_000);
    }

    // ── Fetch news ─────────────────────────────────────────────────────────
    async function loadNews(reset = false) {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;

      try {
        const before = reset ? 0 : (oldestCreatedAt || 0);
        const url = `/api/news?limit=${PAGE_SIZE}${skippedParam()}` + (before > 0 ? `&before=${before}` : '');
        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) throw new Error('API error');

        if (reset) {
          allItems = data.items;
        } else {
          allItems = allItems.concat(data.items);
        }

        if (allItems.length > 0) {
          oldestCreatedAt = allItems[allItems.length - 1].createdAt;
        }
        hasMore = data.hasMore;

        renderCards(data.items, !reset);
        document.getElementById('load-more-wrap').style.display = hasMore ? 'block' : 'none';
        setStatus('ok', `共 ${data.total} 条 · ${fmtTime(new Date())}`);
      } catch (e) {
        setStatus('err', `加载失败: ${e.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    async function refresh() {
      // Only fetch new items (before=0 means latest)
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      try {
        const res = await fetch(`/api/news?limit=${PAGE_SIZE}${skippedParam()}`);
        const data = await res.json();
        if (!data.ok) throw new Error('API error');

        // Find truly new items not in allItems
        const existingIds = new Set(allItems.map(n => n.id));
        const newItems = data.items.filter(n => !existingIds.has(n.id));

        if (newItems.length > 0) {
          allItems = newItems.concat(allItems);
          renderCards(newItems, false, true);
        }

        hasMore = data.hasMore;
        document.getElementById('load-more-wrap').style.display = hasMore ? 'block' : 'none';
        setStatus('ok', `共 ${data.total} 条 · ${fmtTime(new Date())}`);
      } catch (e) {
        setStatus('err', `刷新失败: ${e.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    async function loadMore() {
      const btn = document.getElementById('load-more-btn');
      btn.disabled = true;
      btn.textContent = '加载中…';
      await loadNews(false);
      btn.disabled = false;
      btn.textContent = '加载更多';
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function renderCards(items, append = false, prepend = false) {
      const grid = document.getElementById('news-grid');

      // Remove loading placeholder
      const placeholder = document.getElementById('loading');
      if (placeholder) placeholder.remove();

      if (items.length === 0 && !append && !prepend) {
        grid.innerHTML = '<div id="loading" style="text-align:center;padding:60px 20px;color:var(--text-muted)">暂无新闻数据</div>';
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const item of items) {
        fragment.appendChild(buildCard(item));
      }

      if (prepend) {
        grid.insertBefore(fragment, grid.firstChild);
      } else {
        grid.appendChild(fragment);
      }
    }

    function buildCard(item) {
      const card = document.createElement('div');
      card.className = item.skipped ? 'card skipped' : 'card';
      card.dataset.id = item.id;

      // Time
      const timeEl = document.createElement('div');
      timeEl.className = 'card-time';
      timeEl.textContent = item.time || fmtTime(new Date(item.createdAt));
      if (item.skipped) {
        timeEl.innerHTML += `<span class="skip-badge">${esc(item.skipReason || '已跳过')}</span>`;
      }
      card.appendChild(timeEl);

      // Title (optional)
      if (item.title) {
        const titleEl = document.createElement('div');
        titleEl.className = 'card-title';
        titleEl.textContent = item.title;
        card.appendChild(titleEl);
      }

      // Content
      const contentEl = document.createElement('div');
      contentEl.className = 'card-content';
      contentEl.textContent = item.content;
      card.appendChild(contentEl);

      // Skipped news: no AI block or actions
      if (item.skipped) return card;

      // AI analysis block
      if (item.analysis) {
        card.appendChild(buildAiBlock(item.analysis, item.analysisSource, item.technical));
      } else if (item.analysisError) {
        const noAi = document.createElement('div');
        noAi.className = 'ai-block';
        noAi.innerHTML = `<div class="ai-no-analysis">🤖 AI 分析暂不可用：${esc(item.analysisError)}</div>`;
        card.appendChild(noAi);
      }

      // Card actions
      const actions = document.createElement('div');
      actions.className = 'card-actions';
      const reanalyzeBtn = document.createElement('button');
      reanalyzeBtn.className = 'reanalyze-btn';
      reanalyzeBtn.textContent = '🔄 重新AI分析';
      reanalyzeBtn.onclick = () => reanalyzeNews(item.id);
      actions.appendChild(reanalyzeBtn);
      card.appendChild(actions);

      return card;
    }

    function buildAiBlock(analysisText, source, technical) {
      const parsed = parseAnalysis(analysisText);
      const dir = detectDirection(parsed.direction || '');

      const block = document.createElement('div');
      block.className = 'ai-block';

      // Header (always visible, clickable to toggle body)
      const header = document.createElement('div');
      header.className = 'ai-header';

      const label = document.createElement('span');
      label.className = 'ai-header-label';
      label.textContent = `📊 AI 分析${source ? '（' + source + '）' : ''}`;

      const badge = document.createElement('span');
      badge.className = `direction-badge ${dir.cls}`;
      badge.textContent = dir.short;

      const toggle = document.createElement('span');
      toggle.className = 'ai-toggle open';
      toggle.textContent = '▼';

      header.appendChild(label);
      header.appendChild(badge);
      header.appendChild(toggle);

      // Body
      const body = document.createElement('div');
      body.className = 'ai-body';

      // Render each parsed field
      const FIELD_LABELS = [
        ['target',    '标的'],
        ['direction', '方向'],
        ['logic',     '逻辑链'],
        ['driver',    '核心驱动'],
        ['risk',      '关键风险'],
        ['signal',    '确认信号'],
        ['tech',      '技术面'],
      ];
      for (const [key, label] of FIELD_LABELS) {
        if (parsed[key]) {
          const row = document.createElement('div');
          row.className = 'ai-row';
          row.innerHTML = `<span class="ai-row-label">${esc(label)}：</span><span class="ai-row-value">${esc(parsed[key])}</span>`;
          body.appendChild(row);
        }
      }

      // If we couldn't parse structured fields, show raw text
      if (!Object.values(parsed).some(Boolean)) {
        const raw = document.createElement('div');
        raw.style.cssText = 'font-size:0.78rem;line-height:1.6;white-space:pre-wrap';
        raw.textContent = analysisText;
        body.appendChild(raw);
      }

      // Technical analysis (from TradingView)
      if (technical) {
        const techBlock = document.createElement('div');
        techBlock.className = 'tech-block';
        techBlock.textContent = technical;
        body.appendChild(techBlock);
      }

      block.appendChild(header);
      block.appendChild(body);

      // Toggle collapse
      header.addEventListener('click', () => {
        const collapsed = body.classList.toggle('collapsed');
        toggle.classList.toggle('open', !collapsed);
      });

      return block;
    }

    // ── Analysis parser ────────────────────────────────────────────────────
    function parseAnalysis(text) {
      if (!text) return {};
      const result = {};
      const MAP = {
        '标的':   'target',
        '方向':   'direction',
        '逻辑链': 'logic',
        '核心驱动': 'driver',
        '关键风险': 'risk',
        '确认信号': 'signal',
        '技术面': 'tech',
      };
      const lines = text.split('\n');
      let currentKey = null;
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        let matched = false;
        for (const [cn, en] of Object.entries(MAP)) {
          if (trimmed.startsWith(cn + '：') || trimmed.startsWith(cn + ':')) {
            currentKey = en;
            result[en] = trimmed.slice(cn.length + 1).trim();
            matched = true;
            break;
          }
        }
        if (!matched && currentKey && result[currentKey] !== undefined) {
          result[currentKey] += ' ' + trimmed;
        }
      }
      return result;
    }

    function detectDirection(dirText) {
      const t = dirText || '';
      if (/利好/.test(t)) return { cls: 'bull',    short: '利好 📈' };
      if (/利空/.test(t)) return { cls: 'bear',    short: '利空 📉' };
      if (/中性/.test(t)) return { cls: 'neutral', short: '中性 ➡️' };
      return { cls: 'neutral', short: dirText ? dirText.slice(0, 6) : '—' };
    }

    // ── Status bar ─────────────────────────────────────────────────────────
    function setStatus(state, text) {
      const dot  = document.getElementById('status-dot');
      const span = document.getElementById('status-text');
      dot.className = state;
      span.textContent = text;
    }

    async function updateStatusBar() {
      try {
        const res = await fetch('/api/status');
        const d = await res.json();
        if (d.ok) {
          const info = `推送 ${d.ok || 0} 次 · 失败 ${d.fail || 0} 次`;
          setStatus('ok', info + ' · ' + fmtTime(new Date()));
        }
      } catch {}
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fmtTime(d) {
      return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ── Re-analyze ─────────────────────────────────────────────────────────
    async function reanalyzeNews(id) {
      const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
      const btn = card?.querySelector('.reanalyze-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '分析中…';
      }
      try {
        const res = await fetch('/api/news/reanalyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id }),
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error || '分析失败');

        if (card) {
          // Remove old AI block
          const oldBlock = card.querySelector('.ai-block');
          if (oldBlock) oldBlock.remove();

          // Insert new AI block before the actions div
          const actions = card.querySelector('.card-actions');
          if (d.analysis) {
            const newBlock = buildAiBlock(d.analysis, d.analysisSource, d.technical);
            card.insertBefore(newBlock, actions);
          } else if (d.analysisError) {
            const noAi = document.createElement('div');
            noAi.className = 'ai-block';
            noAi.innerHTML = `<div class="ai-no-analysis">🤖 AI 分析暂不可用：${esc(d.analysisError)}</div>`;
            card.insertBefore(noAi, actions);
          }
        }

        // Update local allItems cache
        const idx = allItems.findIndex(n => n.id === id);
        if (idx !== -1) {
          const { analysis, analysisSource, analysisError, technical } = d;
          allItems[idx] = { ...allItems[idx], analysis, analysisSource, analysisError, technical };
        }
      } catch (e) {
        alert(`重新AI分析失败: ${e.message}`);
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = '🔄 重新AI分析';
        }
      }
    }

    // ── Start ──────────────────────────────────────────────────────────────
    init();

    // ── Daily Analysis ─────────────────────────────────────────────────────
    let dailyPanelVisible = false;

    function toggleDailyPanel() {
      dailyPanelVisible = !dailyPanelVisible;
      const panel = document.getElementById('daily-panel');
      panel.classList.toggle('visible', dailyPanelVisible);
      if (dailyPanelVisible) loadDailyAnalysis();
    }

    async function loadDailyAnalysis() {
      const meta = document.getElementById('daily-meta');
      const rows = document.getElementById('daily-rows');
      const empty = document.getElementById('daily-empty');
      meta.textContent = '加载中…';
      rows.innerHTML = '';
      empty.style.display = 'none';
      try {
        const res = await fetch('/api/daily-analysis');
        const d = await res.json();
        if (!d.ok) throw new Error('API error');
        const entry = d.analysis;
        if (!entry) {
          meta.textContent = `日期：${d.date} · 暂无分析`;
          empty.style.display = 'block';
          return;
        }
        const genAt = new Date(entry.generatedAt).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
        meta.textContent = `日期：${d.date} · 共 ${entry.newsCount} 条新闻 · 生成于 ${genAt} · 来源：${entry.source || '—'}`;
        rows.innerHTML = '';
        const DAILY_FIELDS = [
          ['市场概述', '市场概述'],
          ['主要主题', '主要主题'],
          ['利好资产', '利好资产'],
          ['利空资产', '利空资产'],
          ['核心驱动', '核心驱动'],
          ['明日关注', '明日关注'],
          ['风险提示', '风险提示'],
        ];
        const parsed = parseDailyAnalysis(entry.text);
        let hasAny = false;
        for (const [key, label] of DAILY_FIELDS) {
          if (parsed[key]) {
            hasAny = true;
            const row = document.createElement('div');
            row.className = 'daily-row';
            row.innerHTML = `<span class="daily-row-label">${esc(label)}：</span><span>${esc(parsed[key])}</span>`;
            rows.appendChild(row);
          }
        }
        if (!hasAny) {
          const raw = document.createElement('div');
          raw.style.cssText = 'font-size:0.82rem;line-height:1.7;white-space:pre-wrap;color:var(--text)';
          raw.textContent = entry.text;
          rows.appendChild(raw);
        }
      } catch (e) {
        meta.textContent = `加载失败: ${e.message}`;
      }
    }

    function parseDailyAnalysis(text) {
      if (!text) return {};
      const result = {};
      const keys = ['市场概述', '主要主题', '利好资产', '利空资产', '核心驱动', '明日关注', '风险提示'];
      const lines = text.split('\n');
      let currentKey = null;
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        let matched = false;
        for (const k of keys) {
          if (trimmed.startsWith(k + '：') || trimmed.startsWith(k + ':')) {
            currentKey = k;
            result[k] = trimmed.slice(k.length + 1).trim();
            matched = true;
            break;
          }
        }
        if (!matched && currentKey && currentKey in result) {
          result[currentKey] += ' ' + trimmed;
        }
      }
      return result;
    }

    async function triggerDailyAnalysis() {
      const btn = document.getElementById('daily-trigger-btn');
      btn.disabled = true;
      btn.textContent = '生成中…';
      try {
        const res = await fetch('/api/daily-analysis/trigger', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
        const d = await res.json();
        document.getElementById('daily-meta').textContent = d.message || '已触发，请稍后刷新';
      } catch (e) {
        document.getElementById('daily-meta').textContent = `触发失败: ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '🤖 生成今日分析';
      }
    }
  </script>
</body>
</html>
